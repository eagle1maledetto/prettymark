<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PrettyMark</title>
<link rel="icon" href="favicon.ico">
<link id="theme-md" rel="stylesheet" href="github-markdown.css">
<link id="theme-hl" rel="stylesheet" href="highlight-github.min.css">
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 0; background-color: #ffffff; transition: background-color 0.2s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; overflow: hidden; }
body.dark { background-color: #0d1117; }

/* Layout */
#app { display: flex; height: 100vh; }

/* Drawer */
#drawer {
    width: 240px; min-width: 0; height: 100%; overflow-y: auto; overflow-x: hidden;
    border-right: 1px solid #d1d9e0; background: #f6f8fa;
    transition: width 0.2s ease, opacity 0.2s ease;
    flex-shrink: 0;
}
#drawer.collapsed { width: 0; border-right: none; opacity: 0; pointer-events: none; }
body.dark #drawer { background: #161b22; border-right-color: #30363d; }

#drawer-header {
    padding: 10px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: #656d76; border-bottom: 1px solid #d1d9e0;
    display: flex; align-items: center; justify-content: space-between;
}
body.dark #drawer-header { color: #8b949e; border-bottom-color: #30363d; }

#drawer-header button {
    background: none; border: none; cursor: pointer; font-size: 16px; color: #656d76;
    padding: 0 2px; line-height: 1;
}
body.dark #drawer-header button { color: #8b949e; }

#drawer-list { padding: 4px 0; }

.drawer-item {
    padding: 6px 12px; cursor: pointer; display: flex; align-items: center;
    justify-content: space-between; gap: 6px; border-left: 3px solid transparent;
}
.drawer-item:hover { background: #e8ebef; }
body.dark .drawer-item:hover { background: #1c2129; }
.drawer-item.active { border-left-color: #0969da; background: #ddf4ff; }
body.dark .drawer-item.active { border-left-color: #4493f8; background: #1a2332; }

.drawer-info { overflow: hidden; flex: 1; min-width: 0; }
.drawer-filename {
    display: block; font-size: 13px; font-weight: 500; color: #1f2328;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
body.dark .drawer-filename { color: #f0f6fc; }
.drawer-path {
    display: block; font-size: 10px; color: #656d76; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
body.dark .drawer-path { color: #8b949e; }

.drawer-close {
    flex-shrink: 0; width: 18px; height: 18px; line-height: 18px; text-align: center;
    font-size: 14px; color: #656d76; border-radius: 3px; cursor: pointer;
    opacity: 0; transition: opacity 0.1s;
}
.drawer-item:hover .drawer-close { opacity: 1; }
.drawer-close:hover { background: #d1d9e0; color: #1f2328; }
body.dark .drawer-close { color: #8b949e; }
body.dark .drawer-close:hover { background: #30363d; color: #f0f6fc; }

/* Main area */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }

/* Tab bar */
#tab-bar {
    display: flex; align-items: center; height: 36px; min-height: 36px;
    background: #f6f8fa; border-bottom: 1px solid #d1d9e0;
    overflow-x: auto; overflow-y: hidden; flex-shrink: 0;
}
#tab-bar:empty { display: none; }
body.dark #tab-bar { background: #161b22; border-bottom-color: #30363d; }

/* Toggle button in tab bar */
#drawer-toggle {
    flex-shrink: 0; width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; color: #656d76; font-size: 16px;
    border-right: 1px solid #d1d9e0; background: none; border-top: none; border-bottom: none; border-left: none;
}
#drawer-toggle:hover { background: #e8ebef; color: #1f2328; }
body.dark #drawer-toggle { color: #8b949e; border-right-color: #30363d; }
body.dark #drawer-toggle:hover { background: #1c2129; color: #f0f6fc; }

.tab {
    display: flex; align-items: center; gap: 6px; padding: 0 12px; height: 100%;
    font-size: 12px; color: #656d76; cursor: pointer; white-space: nowrap;
    border-right: 1px solid #d1d9e0; flex-shrink: 0; max-width: 200px;
}
.tab:hover { background: #e8ebef; }
body.dark .tab { color: #8b949e; border-right-color: #30363d; }
body.dark .tab:hover { background: #1c2129; }

.tab.active { color: #1f2328; background: #ffffff; font-weight: 500; }
body.dark .tab.active { color: #f0f6fc; background: #0d1117; }

.tab-name { overflow: hidden; text-overflow: ellipsis; }

.tab-close {
    font-size: 14px; line-height: 1; padding: 0 2px; border-radius: 3px;
    opacity: 0; transition: opacity 0.1s; flex-shrink: 0;
}
.tab:hover .tab-close { opacity: 1; }
.tab-close:hover { background: #d1d9e0; }
body.dark .tab-close:hover { background: #30363d; }

/* Content area */
#content-area { flex: 1; overflow-y: auto; }
.markdown-body { padding: 32px 40px; max-width: 860px; margin: 0 auto; }

/* Status bar */
#status-bar {
    display: flex; align-items: center; height: 26px; min-height: 26px;
    padding: 0 10px; font-size: 11px; color: #656d76;
    background: #f6f8fa; border-top: 1px solid #d1d9e0; flex-shrink: 0;
    gap: 10px;
}
body.dark #status-bar { background: #161b22; border-top-color: #30363d; color: #8b949e; }

#zoom-control { display: flex; align-items: center; gap: 6px; }
#zoom-slider {
    -webkit-appearance: none; appearance: none; width: 100px; height: 4px;
    background: #d1d9e0; border-radius: 2px; outline: none; cursor: pointer;
}
body.dark #zoom-slider { background: #30363d; }
#zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 12px; height: 12px;
    background: #656d76; border-radius: 50%; cursor: pointer;
}
body.dark #zoom-slider::-webkit-slider-thumb { background: #8b949e; }
#zoom-label { min-width: 32px; text-align: center; }

#status-info { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

/* Find bar */
#find-bar {
    display: none; position: fixed; top: 8px; right: 8px; z-index: 1000;
    background: #fff; border: 1px solid #d0d7de; border-radius: 6px;
    padding: 4px 8px; box-shadow: 0 1px 3px rgba(0,0,0,.12);
    align-items: center; gap: 4px;
}
body.dark #find-bar { background: #161b22; border-color: #30363d; }
#find-input {
    border: 1px solid #d0d7de; border-radius: 4px; padding: 4px 8px;
    font-size: 13px; width: 200px; outline: none; background: #fff; color: #1f2328;
}
body.dark #find-input { background: #0d1117; border-color: #30363d; color: #e6edf3; }
#find-input:focus { border-color: #0969da; box-shadow: 0 0 0 2px rgba(9,105,218,.3); }
body.dark #find-input:focus { border-color: #4493f8; box-shadow: 0 0 0 2px rgba(68,147,248,.3); }
#find-bar button {
    background: none; border: 1px solid transparent; border-radius: 4px;
    cursor: pointer; padding: 2px 6px; color: #656d76; font-size: 14px;
}
#find-bar button:hover { background: #f3f4f6; border-color: #d0d7de; }
body.dark #find-bar button { color: #8b949e; }
body.dark #find-bar button:hover { background: #30363d; border-color: #484f58; }
#find-count { font-size: 11px; color: #656d76; min-width: 40px; text-align: center; }
body.dark #find-count { color: #8b949e; }
mark.find-match { background: #fff2b0; color: inherit; border-radius: 2px; }
body.dark mark.find-match { background: #6e5e14; }
mark.find-match.current { background: #f9826c; }
body.dark mark.find-match.current { background: #b35c44; }

/* Print */
@media print {
    #drawer, #tab-bar, #status-bar, #find-bar { display: none !important; }
    #app { display: block; }
    #main { display: block; height: auto; }
    #content-area { overflow: visible; height: auto; zoom: 1 !important; }
    body { overflow: visible; background: #fff !important; }
    body.dark { background: #fff !important; color: #1f2328 !important; }
    .markdown-body { padding: 0; max-width: none; }
}
</style>
</head>
<body>

<div id="app">
    <div id="drawer">
        <div id="drawer-header">
            <span>Open Files</span>
            <button onclick="toggleDrawer()" title="Close sidebar">&times;</button>
        </div>
        <div id="drawer-list"></div>
    </div>
    <div id="main">
        <div id="tab-bar">
            <button id="drawer-toggle" onclick="toggleDrawer()" title="Toggle sidebar">&#9776;</button>
        </div>
        <div id="content-area">
            <article class="markdown-body" id="content"></article>
        </div>
        <div id="status-bar">
            <div id="status-info"></div>
            <div id="zoom-control">
                <span style="cursor:pointer;" onclick="zoomOut()" title="Zoom out">&#x2212;</span>
                <input type="range" id="zoom-slider" min="50" max="200" value="100" step="10" oninput="setZoomFromSlider(this.value)">
                <span style="cursor:pointer;" onclick="zoomIn()" title="Zoom in">+</span>
                <span id="zoom-label">100%</span>
            </div>
        </div>
    </div>
</div>

<div id="find-bar">
    <input type="text" id="find-input" placeholder="Find...">
    <span id="find-count"></span>
    <button id="find-prev" title="Previous (Shift+Enter)">&#9650;</button>
    <button id="find-next" title="Next (Enter)">&#9660;</button>
    <button id="find-close" title="Close (Esc)">&times;</button>
</div>

<script src="marked.min.js"></script>
<script src="highlight.min.js"></script>
<script>
var _el = document.getElementById('content');
var _zoom = 1.0;
var _dark = false;
var _drawerOpen = true;
var _strings = {};

marked.setOptions({ gfm: true, breaks: false });

function T(key) { return _strings[key] || key; }

function setStrings(obj) {
    _strings = obj;
    _applyStrings();
}

function _applyStrings() {
    // Drawer header
    var dh = document.querySelector('#drawer-header span');
    if (dh) dh.textContent = T('drawer_header');
    var dhBtn = document.querySelector('#drawer-header button');
    if (dhBtn) dhBtn.title = T('tooltip_close_sidebar');

    // Toggle sidebar button
    var dt = document.getElementById('drawer-toggle');
    if (dt) dt.title = T('tooltip_toggle_sidebar');

    // Find bar
    var fi = document.getElementById('find-input');
    if (fi) fi.placeholder = T('find_placeholder');
    var fp = document.getElementById('find-prev');
    if (fp) fp.title = T('find_prev_tooltip');
    var fn = document.getElementById('find-next');
    if (fn) fn.title = T('find_next_tooltip');
    var fc = document.getElementById('find-close');
    if (fc) fc.title = T('find_close_tooltip');

    // Zoom tooltips
    var zOutSpan = document.querySelector('#zoom-control span[onclick="zoomOut()"]');
    if (zOutSpan) zOutSpan.title = T('tooltip_zoom_out');
    var zInSpan = document.querySelector('#zoom-control span[onclick="zoomIn()"]');
    if (zInSpan) zInSpan.title = T('tooltip_zoom_in');

    // Re-render welcome/about if visible
    if (_el.querySelector('h1') && _el.querySelector('h1').textContent === 'PrettyMark' &&
        _el.style.cssText.indexOf('justify-content') !== -1) {
        showWelcome();
    }
    var aboutEl = document.getElementById('prettymark-about');
    if (aboutEl) { aboutEl.remove(); showAbout(); }
}

function setDarkMode(on) {
    _dark = on;
    document.body.classList.toggle('dark', on);
    document.getElementById('theme-md').href = on ? 'github-markdown-dark.css' : 'github-markdown.css';
    document.getElementById('theme-hl').href = on ? 'highlight-github-dark.min.css' : 'highlight-github.min.css';
}

function isDarkMode() { return _dark; }

function render(md) {
    _el.style.cssText = '';
    _el.innerHTML = marked.parse(md);
    document.querySelectorAll('pre code').forEach(function(block) {
        hljs.highlightElement(block);
    });
    // Scroll to top on new content
    document.getElementById('content-area').scrollTop = 0;
}

function showWelcome() {
    _el.style.cssText = 'display:flex;justify-content:center;align-items:center;min-height:80vh;';
    _el.innerHTML =
        '<div style="text-align:center;">' +
        '<h1 style="border:none;padding:0;">' + T('app_name') + '</h1>' +
        '<p style="color:#656d76;font-size:18px;">' + T('welcome_subtitle') + '</p>' +
        '<hr style="margin:24px auto;width:200px;">' +
        '<p>' + T('welcome_open_instruction') + '</p>' +
        '<p style="color:#656d76;">' + T('welcome_drag_instruction') + '</p>' +
        '</div>';
}

// --- Zoom ---
function _updateZoom() {
    document.getElementById('content-area').style.zoom = _zoom;
    document.getElementById('zoom-slider').value = Math.round(_zoom * 100);
    document.getElementById('zoom-label').textContent = Math.round(_zoom * 100) + '%';
}
function zoomIn() {
    _zoom = Math.min(Math.round((_zoom + 0.1) * 10) / 10, 2.0);
    _updateZoom();
}
function zoomOut() {
    _zoom = Math.max(Math.round((_zoom - 0.1) * 10) / 10, 0.5);
    _updateZoom();
}
function zoomReset() {
    _zoom = 1.0;
    _updateZoom();
}
function setZoomFromSlider(val) {
    _zoom = parseInt(val) / 100;
    _updateZoom();
}

// --- Drawer ---
function setDrawerOpen(open) {
    _drawerOpen = open;
    document.getElementById('drawer').classList.toggle('collapsed', !open);
}

function toggleDrawer() {
    setDrawerOpen(!_drawerOpen);
    window.chrome.webview.postMessage({ type: 'drawer_toggled', open: _drawerOpen });
}

// --- Tabs ---
function addTab(info) {
    // info: { id, name, path }
    // Add to tab bar
    var tabBar = document.getElementById('tab-bar');
    var tab = document.createElement('div');
    tab.className = 'tab';
    tab.dataset.id = info.id;
    tab.innerHTML = '<span class="tab-name">' + _esc(info.name) + '</span><span class="tab-close">&times;</span>';
    tab.querySelector('.tab-name').addEventListener('click', function() {
        window.chrome.webview.postMessage({ type: 'switch_tab', id: info.id });
    });
    tab.querySelector('.tab-close').addEventListener('click', function(e) {
        e.stopPropagation();
        window.chrome.webview.postMessage({ type: 'close_tab', id: info.id });
    });
    tabBar.appendChild(tab);

    // Add to drawer
    var drawerList = document.getElementById('drawer-list');
    var item = document.createElement('div');
    item.className = 'drawer-item';
    item.dataset.id = info.id;
    item.innerHTML =
        '<div class="drawer-info">' +
            '<span class="drawer-filename">' + _esc(info.name) + '</span>' +
            '<span class="drawer-path">' + _esc(info.path || '') + '</span>' +
        '</div>' +
        '<span class="drawer-close">&times;</span>';
    item.querySelector('.drawer-info').addEventListener('click', function() {
        window.chrome.webview.postMessage({ type: 'switch_tab', id: info.id });
    });
    item.querySelector('.drawer-close').addEventListener('click', function(e) {
        e.stopPropagation();
        window.chrome.webview.postMessage({ type: 'close_tab', id: info.id });
    });
    drawerList.appendChild(item);

    // Activate this tab
    activateTab(info.id);
}

function activateTab(id) {
    // Tab bar
    document.querySelectorAll('#tab-bar .tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.id === id);
    });
    // Drawer
    document.querySelectorAll('#drawer-list .drawer-item').forEach(function(d) {
        d.classList.toggle('active', d.dataset.id === id);
    });
}

function removeTab(id) {
    var tab = document.querySelector('#tab-bar .tab[data-id="' + id + '"]');
    if (tab) tab.remove();
    var item = document.querySelector('#drawer-list .drawer-item[data-id="' + id + '"]');
    if (item) item.remove();
}

function _esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// --- About ---
function showAbout() {
    var existing = document.getElementById('prettymark-about');
    if (existing) { existing.remove(); return; }
    var o = document.createElement('div');
    o.id = 'prettymark-about';
    o.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:9999;';
    var bg = _dark ? '#161b22' : '#fff';
    var fg = _dark ? '#f0f6fc' : '#1f2328';
    var sub = _dark ? '#8b949e' : '#656d76';
    var link = _dark ? '#4493f8' : '#0969da';
    var btnBg = _dark ? '#21262d' : '#f6f8fa';
    var btnBorder = _dark ? '#30363d' : '#d1d9e0';
    o.innerHTML = '<div style="background:' + bg + ';border-radius:12px;overflow:hidden;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;max-width:480px;max-height:90vh;display:flex;flex-direction:column;position:relative;">'
        + '<button id="prettymark-about-close" style="position:absolute;top:8px;right:8px;width:28px;height:28px;border:none;background:rgba(0,0,0,0.3);color:#fff;font-size:18px;line-height:1;border-radius:6px;cursor:pointer;z-index:1;">&times;</button>'
        + '<div style="background:' + (bg === '#fff' ? '#f6f8fa' : '#0d1117') + ';padding:24px;flex-shrink:0;"><img src="logo.png" alt="PrettyMark" style="max-width:100%;max-height:40vh;display:block;margin:0 auto;"></div>'
        + '<div style="padding:20px 32px 28px;">'
        + '<h2 style="margin:0 0 8px 0;color:' + fg + ';">' + T('app_name') + '</h2>'
        + '<p style="margin:0 0 12px 0;color:' + sub + ';font-size:14px;">' + T('about_description') + '</p>'
        + '<a href="https://gitlab.com/eagle1/prettymark" style="color:' + link + ';font-size:14px;">gitlab.com/eagle1/prettymark</a>'
        + '<br><br><button id="prettymark-about-ok" style="padding:6px 20px;border:1px solid ' + btnBorder + ';border-radius:6px;background:' + btnBg + ';color:' + fg + ';cursor:pointer;font-size:14px;">OK</button>'
        + '</div></div>';
    var closeAbout = function() { o.remove(); document.removeEventListener('keydown', escHandler); };
    var escHandler = function(e) { if (e.key === 'Escape') closeAbout(); };
    o.addEventListener('click', function(e) { if (e.target === o) closeAbout(); });
    document.body.appendChild(o);
    document.getElementById('prettymark-about-ok').addEventListener('click', closeAbout);
    document.getElementById('prettymark-about-close').addEventListener('click', closeAbout);
    document.addEventListener('keydown', escHandler);
}

// External links — open in system browser
document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href]');
    if (a && a.href && (a.href.startsWith('http://') || a.href.startsWith('https://'))) {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'open_url', url: a.href });
    }
});

// Close WinForms menu on click
document.addEventListener('mousedown', function() {
    window.chrome.webview.postMessage({ type: 'click' });
});

// --- Drag & drop ---
document.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
});

// --- Find bar (DOM-based highlighting) ---
var _findMatches = [];
var _findCurrent = -1;

function _clearFind() {
    _findMatches = [];
    _findCurrent = -1;
    document.getElementById('find-count').textContent = '';
    // Unwrap all <mark> elements
    _el.querySelectorAll('mark.find-match').forEach(function(m) {
        var parent = m.parentNode;
        parent.replaceChild(document.createTextNode(m.textContent), m);
        parent.normalize();
    });
}

function _highlightFind(query) {
    _clearFind();
    if (!query) return;
    var lowerQuery = query.toLowerCase();
    var walker = document.createTreeWalker(_el, NodeFilter.SHOW_TEXT, null);
    var textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    for (var i = 0; i < textNodes.length; i++) {
        var node = textNodes[i];
        var text = node.textContent;
        var lowerText = text.toLowerCase();
        var idx = lowerText.indexOf(lowerQuery);
        if (idx === -1) continue;
        var frag = document.createDocumentFragment();
        var lastIdx = 0;
        while (idx !== -1) {
            if (idx > lastIdx) frag.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
            var mark = document.createElement('mark');
            mark.className = 'find-match';
            mark.textContent = text.substring(idx, idx + query.length);
            frag.appendChild(mark);
            _findMatches.push(mark);
            lastIdx = idx + query.length;
            idx = lowerText.indexOf(lowerQuery, lastIdx);
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.substring(lastIdx)));
        node.parentNode.replaceChild(frag, node);
    }
    if (_findMatches.length > 0) {
        _findCurrent = 0;
        _showCurrentMatch();
    }
    _updateFindCount();
}

function _showCurrentMatch() {
    _findMatches.forEach(function(m) { m.classList.remove('current'); });
    if (_findCurrent >= 0 && _findCurrent < _findMatches.length) {
        var m = _findMatches[_findCurrent];
        m.classList.add('current');
        m.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
}

function _updateFindCount() {
    var el = document.getElementById('find-count');
    if (_findMatches.length === 0) {
        el.textContent = document.getElementById('find-input').value ? T('find_no_results') : '';
    } else {
        el.textContent = (_findCurrent + 1) + '/' + _findMatches.length;
    }
}

function findNext() {
    if (_findMatches.length === 0) return;
    _findCurrent = (_findCurrent + 1) % _findMatches.length;
    _showCurrentMatch();
    _updateFindCount();
}

function findPrev() {
    if (_findMatches.length === 0) return;
    _findCurrent = (_findCurrent - 1 + _findMatches.length) % _findMatches.length;
    _showCurrentMatch();
    _updateFindCount();
}

function toggleFind() {
    var bar = document.getElementById('find-bar');
    if (bar.style.display === 'flex') {
        bar.style.display = 'none';
        _clearFind();
    } else {
        bar.style.display = 'flex';
        var input = document.getElementById('find-input');
        input.focus();
        input.select();
    }
}

document.getElementById('find-input').addEventListener('input', function() {
    _highlightFind(this.value);
});
document.getElementById('find-next').addEventListener('click', function() { findNext(); });
document.getElementById('find-prev').addEventListener('click', function() { findPrev(); });
document.getElementById('find-close').addEventListener('click', function() {
    document.getElementById('find-bar').style.display = 'none';
    _clearFind();
});
document.getElementById('find-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        if (e.shiftKey) findPrev(); else findNext();
    }
    if (e.key === 'Escape') {
        document.getElementById('find-bar').style.display = 'none';
        _clearFind();
    }
});

// --- Keyboard shortcuts ---
document.addEventListener('keydown', function(e) {
    // Skip if typing in find input
    if (e.target.id === 'find-input') return;
    if (e.ctrlKey && e.key === 'o') {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'shortcut', action: 'open' });
    }
    else if (e.ctrlKey && e.key === 'w') {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'shortcut', action: 'close_tab' });
    }
    else if (e.ctrlKey && e.key === 'f') {
        e.preventDefault();
        toggleFind();
    }
    else if (e.key === 'F11') {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'shortcut', action: 'fullscreen' });
    }
    else if (e.ctrlKey && e.key === 'd') {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'shortcut', action: 'dark_mode' });
    }
    else if (e.ctrlKey && e.key === 'b') {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'shortcut', action: 'sidebar' });
    }
    else if (e.ctrlKey && e.key === 'p') {
        e.preventDefault();
        window.chrome.webview.postMessage({ type: 'shortcut', action: 'print' });
    }
    else if (e.ctrlKey && (e.key === '+' || e.key === '=')) {
        e.preventDefault();
        zoomIn();
    }
    else if (e.ctrlKey && e.key === '-') {
        e.preventDefault();
        zoomOut();
    }
    else if (e.ctrlKey && e.key === '0') {
        e.preventDefault();
        zoomReset();
    }
});
</script>
</body>
</html>
